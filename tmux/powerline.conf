# vim: ft=tmux
# Poimandres theme - seamless powerline style
# Credit: @craftzdog for the seamless powerline inspiration

set -g mode-style "fg=#e4f0fb,bg=#1b1e28"

set -g message-style "fg=#e4f0fb,bg=#1b1e28"
set -g message-command-style "fg=#e4f0fb,bg=#1b1e28"

set -g pane-border-style "fg=#303340"
set -g pane-active-border-style "fg=#5DE4c7"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#767c9d,bg=#1b1e28"

set -g status-bg "#1b1e28"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

# Status left: #e4f0fb bg → #767c9d bg → #1b1e28 bg (like craftzdog's light→medium→dark)
set -g status-left "#[fg=#1b1e28,bg=#e4f0fb,bold] #S #[fg=#e4f0fb,bg=#767c9d,nobold,nounderscore,noitalics]#[fg=#1b1e28,bg=#767c9d,bold] #(whoami) #[fg=#767c9d,bg=#1b1e28,nobold,nounderscore,noitalics]"

# Status right: prefix indicator (lights up green when pressed) ← date/time ← hostname
set -g status-right "#[fg=#{?client_prefix,#5DE4c7,#303340},bg=#1b1e28,nobold,nounderscore,noitalics]#[fg=#{?client_prefix,#1b1e28,#a6accd},bg=#{?client_prefix,#5DE4c7,#303340}] #{?client_prefix,PREFIX,} #[fg=#303340,bg=#{?client_prefix,#5DE4c7,#303340},nobold,nounderscore,noitalics]#[fg=#e4f0fb,bg=#303340] %Y-%m-%d %H:%M #[fg=#767c9d,bg=#303340,nobold,nounderscore,noitalics]#[fg=#1b1e28,bg=#767c9d,bold] #h #[fg=#767c9d,bg=#1b1e28,nobold,nounderscore,noitalics]"


setw -g window-status-activity-style "underscore,fg=#767c9d,bg=#1b1e28"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#767c9d,bg=#1b1e28"

# Inactive window: seamless on #1b1e28
setw -g window-status-format '#[fg=#1b1e28,bg=#1b1e28]#[default] #I  #{b:pane_current_path} #[fg=#1b1e28,bg=#1b1e28,nobold,nounderscore,noitalics]'

# Active window: #1b1e28 → #e4f0fb → #5DE4c7 → #1b1e28 (exactly like craftzdog's pattern)
setw -g window-status-current-format '#[fg=#1b1e28,bg=#e4f0fb]#[fg=#1b1e28,bg=#e4f0fb,bold] #I #[fg=#e4f0fb,bg=#5DE4c7]#[fg=#1b1e28,bg=#5DE4c7,bold] #{b:pane_current_path} #[fg=#5DE4c7,bg=#1b1e28,nobold]'
